<!DOCTYPE html>
<html lang="zh">
    <head>
        <title>609 - 登录</title>
        <style>
            .link_style{
                background-color: palegreen;
                color: skyblue;
                padding: 20px 20px;
                text-decoration: none;
            }
        </style>
        <script>
            var s;
            var storedUsers = [];

            async function fetchUserData() {
                var proxies = [
                    'https://api.allorigins.win/raw?url=',
                    'https://api.codetabs.com/v1/proxy?quest=',
                    'https://corsproxy.io/?'
                ];
                var url = 'https://note.ms/hqzx609users';
                
                console.log('开始加载用户数据...');
                
                for (var i = 0; i < proxies.length; i++) {
                    try {
                        console.log('尝试代理 ' + (i+1) + ': ' + proxies[i]);
                        
                        var controller = new AbortController();
                        var timeout = setTimeout(() => controller.abort(), 5000);
                        
                        var response = await fetch(proxies[i] + encodeURIComponent(url), {
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeout);
                        
                        if (!response.ok) {
                            console.log('代理 ' + (i+1) + ' 返回错误: ' + response.status);
                            continue;
                        }
                        
                        var text = await response.text();
                        console.log('获取到原始内容:', text.substring(0, 200) + '...');
                        
                        var codeBlockMatch = text.match(/```[\s\S]*?```/);
                        var content = codeBlockMatch ? codeBlockMatch[0].replace(/```/g, '').trim() : text.trim();
                        
                        var lines = content.split('\n');
                        for (var line of lines) {
                            var parts = line.trim().split(/\s+/);
                            if (parts.length >= 2) {
                                storedUsers.push({ username: parts[0], password: parts[1] });
                            }
                        }
                        console.log('用户数据加载成功:', storedUsers);
                        return;
                    } catch (e) {
                        console.log('代理 ' + (i+1) + ' 失败:', e.message);
                    }
                }
                
                console.error('所有代理都失败了，使用默认用户');
                storedUsers = [{ username: 'test', password: '123456' }];
            }

            fetchUserData();

            setTimeout(function() {
                if (storedUsers.length === 0) {
                    console.log('数据加载超时，使用默认用户');
                    storedUsers = [{ username: 'test', password: '123456' }];
                }
            }, 8000);

            function getCode(){
                s = Math.floor(Math.random() * 100000) + 1;
                window.alert("你的验证码是：" + s);
            }
            function check(){
                var n = document.getElementById("username").value;
                var p = document.getElementById("userpassword").value;
                var v = document.getElementById("verify_code").value;
                if (v != s) {
                    window.alert("验证码错误");
                    return;
                }
                var userFound = storedUsers.find(function(u) {
                    return u.username === n && u.password === p;
                });
                if (!userFound) {
                    window.alert("用户名或密码错误！");
                } else {
                    window.alert("登录成功！");
                    window.location.href='./index.html?username=' + encodeURIComponent(n);
                }
            }
        </script>
    </head>
    <body>
        <div class width="800" height="80" id="top">
            <a href="./index.html" style="text-decoration: none;">
                <span><img src="./609_icon.png" alt="7891" width="100" height="75"></img></span>
            </a>
            <a href="./index.html" class="link_style">主页</a>
            <a href="./login.html" class="link_style">登录</a>
            <a href="./register.html" class="link_style">注册</a>
            </div>
        </div>
        <br>
        <div class id="main" style="text-align: center;">
            <img src="./609_icon.png" alt="7891" width="200" height="150"></img>
            <div style="font-size: 30px;">登录</div>
            <input placeholder="用户名" id="username"></input>
            <br>
            <input placeholder="密码" type="password" id="userpassword"></input>
            <br>
            <input placeholder="验证码" id="verify_code"></input>
            <button onclick="getCode()">获取验证码</button>
            <br>
            <button onclick="check()" style="background-color: palegreen;">登录</button>
            <br>
            <a href="./register.html" style="color: skyblue; text-decoration: none;">没有账号？立即注册！</a>
        </div>
    </body>
</html>
